<body>
<canvas id="game"></canvas>
<script>
// Debug-Overlay (nur mit ?debug in der URL aktiv)
if (location.search.includes('debug')) {
  window.addEventListener('error', (e) => {
    let box = document.getElementById('errbox');
    if (!box) {
      box = document.createElement('div');
      box.id = 'errbox';
      box.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#b00020;color:#fff;font:12px monospace;padding:8px;z-index:9999;white-space:pre-wrap;max-height:40vh;overflow:auto';
      document.body.appendChild(box);
    }
    box.textContent += `${e.message} @ ${(e.filename || '').split('/').pop()}:${e.lineno}\n`;
  });
}
</script>
